name: Gerar Boletim Final (pos-revisao Alice)

on:
  workflow_dispatch:  # permite disparar manualmente (para debug)
  repository_dispatch:  # disparado pelo site quando Alice confirma revisao
    types: [confirmar-revisao]

permissions:
  contents: write

concurrency:
  group: boletim-final
  cancel-in-progress: false

jobs:
  gerar-boletim-final:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Nao precisa instalar dependencias externas - o script usa so stdlib
      # Se um dia precisar de bibliotecas, descomentar:
      # - name: Instalar dependencias
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt

      - name: Verificar arquivos de entrada
        run: |
          echo "Verificando output/boletim.json..."
          if [ ! -f output/boletim.json ]; then
            echo "ERRO: output/boletim.json nao encontrado. Rode o gerar_boletim.py primeiro."
            exit 1
          fi
          echo "  OK"

          echo "Verificando output/decisoes_alice.json..."
          if [ ! -f output/decisoes_alice.json ]; then
            echo "ERRO: output/decisoes_alice.json nao encontrado."
            echo "Este workflow deve ser disparado apos o site commitar as decisoes."
            exit 1
          fi
          echo "  OK"

      - name: Gerar boletins finais
        run: python scripts/gerar_boletim_final.py

      - name: Commit dos boletins finais
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/email_*.html
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca nos boletins finais - nada a commitar."
          else
            git commit -m "boletins-finais: revisao Alice em $(TZ='America/Sao_Paulo' date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Resumo
        run: |
          echo "============================================"
          echo "Boletins finais gerados e commitados."
          echo "Power Automate pode acionar o Fluxo 1 agora."
          echo "============================================"
