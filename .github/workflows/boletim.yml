name: Gerar Boletim Jurídico

on:
  workflow_dispatch:  # permite rodar manualmente
 # schedule:
 #  - cron: "0 11 * * 1-5"  # 08h BRT (11h UTC), seg a sex

permissions:
  contents: write

jobs:
  gerar-boletim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gerar boletim
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python scripts/gerar_boletim.py

      - name: Gerar Word do boletim
        run: python scripts/gerar_html.py

      - name: Gerar auditoria HTML
        run: python scripts/gerar_auditoria_html.py

      - name: Commit do resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "📰 Atualiza boletim - $(date +'%Y-%m-%d')"
          git push
